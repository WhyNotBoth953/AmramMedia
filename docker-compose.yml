version: "3.8"

services:

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    volumes:
      - ${CONFIG_PATH}/plex:/config
      - /mnt/ssd/Movies:/movies
      - /mnt/ssd/Series:/tv
      - /mnt/ssd/Lectures:/lectures
    devices:
      - /dev/dri:/dev/dri
    runtime: nvidia
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, video, compute]

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    networks:
      - media-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/sonarr:/config
      - /mnt/ssd/Series:/tv
      - /mnt/ssd/Downloads:/downloads
    ports:
      - "8989:8989"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    networks:
      - media-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/radarr:/config
      - /mnt/ssd/Movies:/movies
      - /mnt/ssd/Downloads:/downloads
    ports:
      - "7878:7878"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    networks:
      - media-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG_PATH}/qbittorrent:/config
      - /mnt/ssd/Downloads:/downloads
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    networks:
      - media-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/bazarr:/config
      - /mnt/ssd/Movies:/movies
      - /mnt/ssd/Series:/tv
    ports:
      - "6767:6767"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    networks:
      - media-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  telegram-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    container_name: telegram-bot
    networks:
      - media-net
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_CHAT_IDS=${TELEGRAM_ALLOWED_CHAT_IDS}
      - SONARR_URL=http://sonarr:8989
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_URL=http://radarr:7878
      - RADARR_API_KEY=${RADARR_API_KEY}
      - QBITTORRENT_URL=http://qbittorrent:8080
      - QBITTORRENT_USERNAME=${QBITTORRENT_USERNAME}
      - QBITTORRENT_PASSWORD=${QBITTORRENT_PASSWORD}
      - PLEX_URL=${PLEX_URL:-http://plex:32400}
      - PLEX_TOKEN=${PLEX_TOKEN}
      - POLL_INTERVAL=30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/ssd:/mnt/ssd:ro
    restart: unless-stopped
    depends_on:
      - sonarr
      - radarr
      - qbittorrent
    deploy:
      resources:
        limits:
          memory: 128M

  web-dashboard:
    build:
      context: ./web-dashboard
      dockerfile: Dockerfile
    container_name: web-dashboard
    networks:
      - media-net
    environment:
      - SONARR_URL=http://sonarr:8989
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_URL=http://radarr:7878
      - RADARR_API_KEY=${RADARR_API_KEY}
      - QBITTORRENT_URL=http://qbittorrent:8080
      - QBITTORRENT_USERNAME=${QBITTORRENT_USERNAME}
      - QBITTORRENT_PASSWORD=${QBITTORRENT_PASSWORD}
      - BAZARR_URL=http://bazarr:6767
      - BAZARR_API_KEY=${BAZARR_API_KEY}
      - PLEX_URL=http://172.18.0.1:32400
      - PLEX_TOKEN=${PLEX_TOKEN}
    volumes:
      - /mnt/ssd:/mnt/ssd:ro
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - sonarr
      - radarr
      - qbittorrent
      - bazarr
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  media-net:
    driver: bridge
